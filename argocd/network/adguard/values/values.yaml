service:
  dns-tcp:
    enabled: false
  dns-udp:
    enabled: false


persistence:
  config:
    enabled: true
    retain: true
    mountPath: /opt/adguardhome/conf
    accessMode: ReadWriteOnce
    storageClass: longhorn
    size: 1Gi
  data:
    enabled: true
    retain: true
    mountPath: /opt/adguardhome/work
    accessMode: ReadWriteOnce
    storageClass: longhorn
    size: 1Gi


probes:
  liveness:
    enabled: false
  rediness:
    enabled: false
  startup:
    enabled: false