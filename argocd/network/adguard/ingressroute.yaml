apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard-ingress-route
  annotations:
    gethomepage.dev/href: "https://adguard.bowmans.site/"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Adguard
    gethomepage.dev/group: Network
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/ubiquiti-unifi.png"
    gethomepage.dev/app: adguard
    gethomepage.dev/name: Adguard
    gethomepage.dev/widget.type: "adguard"
    gethomepage.dev/widget.url: "https://adguard.bowmans.site/"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=adguard-home"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard.bowmans.site`)
      kind: Rule
      services:
      - name: adguard-adguard-home
        port: 80
  tls:
    secretName: adguard-certificate