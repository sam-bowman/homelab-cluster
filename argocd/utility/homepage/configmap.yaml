apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    traefik: true
  settings.yaml: |
    title: Hoshi Homepage
    description: My really funky homepage
    layout:
    - Media:
        style: row
        columns: 4
    - Infrastructure:
        style: row
        columns: 3
    - Network:
        style: row
        columns: 3
    - CICD:
    - Smart Home:
    fullWidth: true
    useEqualHeights: true
    bookmarksStyle: icons
    providers:
      longhorn:
        url: https://longhorn.bowmans.site
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/github.png
              href: https://github.com/
        - Github homelab cluster:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/github.png
              href: https://github.com/sam-bowman/homelab-cluster
        - Github portfolio website:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/github.png
              href: https://github.com/sam-bowman/portfolio-website
    - Social:
        - Facebook:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/facebook.png
              href: https://facebook.com/
        - Instagram:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/instagram.png
              href: https://instagram.com/
        - Reddit:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/reddit.png
              href: https://reddit.com/
        - X:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/x.png
              href: https://x.com/
    - Shopping:
        - Amazon:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/amazon.png
              href: https://amazon.co.uk/
    - Media:
        - Youtube:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/youtube.png
              href: https://youtube.com/
        - Youtube Music:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/youtube-shorts.png
              href: https://music.youtube.com/
    - Web Games:
        - JKLM:
            - abbr: JKLM
              href: https://jklm.fun/
        - GuessTheSong:
            - abbr: GTS
              href: https://guessthesong.io/
        - Skribbl:
            - abbr: SKR
              href: https://skribbl.io/
    - Game Wikis:
        - Runescape:
            - abbr: RS3
              href: https://runescape.wiki/
        - OldSchool Runescape:
            - abbr: OSRS
              href: https://oldschool.runescape.wiki/
        - Retro Game Walkthroughs:
            - abbr: RPG
              href: https://www.rpgsite.net/
        - WH Horus Heresy:
            - abbr: WHHH
              href: https://gaming.kylebb.com/hhtimeline/
    - Homelab:
        - Requestrr:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/requestrr.png
              href: https://requestrr.bowmans.site/
        - Maintainerr:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/maintainerr.png
              href: https://maintainerr.bowmans.site/
        - TitleCardMaker:
            - abbr: TCM
              href: https://titlecardmaker.bowmans.site/
        - Consul:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/hashicorp-consul.png
              href: https://consul.bowmans.site/
        - Vault:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/hashicorp-vault.png
              href: https://vault.bowmans.site/
        - Gollum:
            - abbr: GLLM
              href: https://gollum.bowmans.site/
        - K8S Dashboard:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/grafana-alerts-dashboard.png
              href: https://dashboard.bowmans.site/
        - n8n:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/n8n.png
              href: https://n8n.bowmans.site/
  services.yaml: |
    - Network:
      - Firewall:
          href: https://firewall.bowmans.site
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/opnsense.png"
          description: OPNSense Firewall
          widget:
            type: opnsense
            url: https://firewall.bowmans.site
            username: {{HOMEPAGE_VAR_OPNSENSE_USERNAME}}
            password: {{HOMEPAGE_VAR_OPNSENSE_PASSWORD}}
    - Infrastructure:
      - PVE1:
          href: https://pve1.bowmans.site:8006/
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/proxmox.png"
          description: Proxmox PVE1
          widget:
            type: proxmox
            url: https://pve1.bowmans.site:8006/
            username: {{HOMEPAGE_VAR_PVE_USERNAME}}
            password: {{HOMEPAGE_VAR_PVE_PASSWORD}}
      - Pterodactyl:
          href: https://pterodactyl.bowmans.site/
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/pterodactyl.png"
          description: Pterodactyl Game Server Hosting
          widget:
            type: pterodactyl
            url: https://pterodactyl.bowmans.site/
            key: {{HOMEPAGE_VAR_PTERODACTYL_API_KEY}}
      - TrueNAS:
          href: https://truenas.bowmans.site
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/truenas-scale.png"
          description: TrueNAS
          widget:
            type: truenas
            version: 2
            url: https://10.10.20.50
            key: {{HOMEPAGE_VAR_TRUENAS_API_KEY}}
            enablePools: true
            nasType: scale
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - longhorn:
        expanded: true
        total: true
        labels: true
        nodes: true
    - unifi_console:
        url: "https://unifi.bowmans.site/"
        username: {{HOMEPAGE_VAR_UNIFI_USERNAME}}
        password: {{HOMEPAGE_VAR_UNIFI_PASSWORD}}
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hour12: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  proxmox.yaml: ""