        secretKey: "OPNSENSE_USERNAME"

      - objectName: "HOMEPAGE_VAR_OVERSEERR_API_KEY"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "OVERSEERR_API_KEY"

      - objectName: "HOMEPAGE_VAR_PLEX_API_KEY"
        secretPath: "secret/data/APP_API_KEYS"
