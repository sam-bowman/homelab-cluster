apiVersion: secrets-store.csi.x-k8s.io/v1alpha1
kind: SecretProviderClass
metadata:
  name: homepage-spc
spec:
  provider: vault
  parameters:
    vaultAddress: 'http://hashicorp-vault.hashicorp-vault:8200'
    roleName: 'main-role'

    objects: |
      - objectName: "HOMEPAGE_VAR_ARGOCD_API_KEY"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "ARGOCD_API_KEY"

      - objectName: "HOMEPAGE_VAR_BAZARR_API_KEY"
