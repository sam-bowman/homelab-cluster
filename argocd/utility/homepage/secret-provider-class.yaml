      - objectName: "HOMEPAGE_VAR_PVE_PASSWORD"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "PVE_PASSWORD"
      - objectName: "HOMEPAGE_VAR_PVE_USERNAME"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "PVE_USERNAME"

      - objectName: "HOMEPAGE_VAR_RADARR_API_KEY"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "RADARR_API_KEY"

      - objectName: "HOMEPAGE_VAR_READARR_API_KEY"
        secretPath: "secret/data/APP_API_KEYS"
