      - objectName: "HOMEPAGE_VAR_UNIFI_PASSWORD"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "UNIFI_PASSWORD"
      - objectName: "HOMEPAGE_VAR_UNIFI_USERNAME"
        secretPath: "secret/data/APP_API_KEYS"
        secretKey: "UNIFI_USERNAME"

  secretObjects:
  - secretName: app-api-keys
    type: Opaque
    data:
      - key: "HOMEPAGE_VAR_ARGOCD_API_KEY"
        objectName: "HOMEPAGE_VAR_ARGOCD_API_KEY"

      - key: "HOMEPAGE_VAR_BAZARR_API_KEY"
