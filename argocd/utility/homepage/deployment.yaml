apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,gethomepage.dev,homepage.bowmans.site" # See gethomepage.dev/installation/#homepage_allowed_hosts . Value before the comma is required for the k8s probe
            
            - name: "HOMEPAGE_VAR_ARGOCD_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_ARGOCD_API_KEY"

            - name: "HOMEPAGE_VAR_BAZARR_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_BAZARR_API_KEY"

            - name: "HOMEPAGE_VAR_HASS_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_HASS_API_KEY"

            - name: "HOMEPAGE_VAR_OPNSENSE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_OPNSENSE_PASSWORD"
            - name: "HOMEPAGE_VAR_OPNSENSE_USERNAME"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_OPNSENSE_USERNAME"

            - name: "HOMEPAGE_VAR_OVERSEERR_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_OVERSEERR_API_KEY"

            - name: "HOMEPAGE_VAR_PLEX_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_PLEX_API_KEY"

            - name: "HOMEPAGE_VAR_PTERODACTYL_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_PTERODACTYL_API_KEY"

            - name: "HOMEPAGE_VAR_PVE_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_PVE_PASSWORD"
            - name: "HOMEPAGE_VAR_PVE_USERNAME"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_PVE_USERNAME"

            - name: "HOMEPAGE_VAR_RADARR_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_RADARR_API_KEY"

            - name: "HOMEPAGE_VAR_READARR_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_READARR_API_KEY"

            - name: "HOMEPAGE_VAR_SABNZBD_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_SABNZBD_API_KEY"

            - name: "HOMEPAGE_VAR_SONARR_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_SONARR_API_KEY"

            - name: "HOMEPAGE_VAR_TAUTULLI_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_TAUTULLI_API_KEY"

            - name: "HOMEPAGE_VAR_TRUENAS_API_KEY"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_TRUENAS_API_KEY"

            - name: "HOMEPAGE_VAR_UNIFI_PASSWORD"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_UNIFI_PASSWORD"
            - name: "HOMEPAGE_VAR_UNIFI_USERNAME"
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: "HOMEPAGE_VAR_UNIFI_USERNAME"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/proxmox.yaml
              name: homepage-config
              subPath: proxmox.yaml
            - mountPath: /app/config/logs
              name: logs
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
        - name: secrets-store-inline
          csi:
            driver: 'secrets-store.csi.k8s.io'
            readOnly: true
            volumeAttributes:
              secretProviderClass: homepage-spc