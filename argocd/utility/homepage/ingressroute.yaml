apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress-route
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`homepage.bowmans.site`)
      kind: Rule
      services:
      - name: homepage
        port: 3000
  tls:
    secretName: homepage-certificate