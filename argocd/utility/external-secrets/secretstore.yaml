apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  namespace: external-secrets
spec:
  provider:
    vault:
      server: 'http://hashicorp-vault.hashicorp-vault:8200'
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: 'main-role'
          serviceAccountRef:
            name: "external-secrets"
            namespace: external-secrets