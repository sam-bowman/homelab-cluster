apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-ingress-route
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`authentik.bowmans.site`)
      kind: Rule
      services:
      - name: authentik
        port: 9000
  tls:
    secretName: authentik-certificate